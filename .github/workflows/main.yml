name: Build JugglucoNG APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'mobileLibre3SiDexGoogleRelease'
        type: choice
        options:
          - mobileLibre3SiDexGoogleRelease
          - mobileLibre3SiDexNogoogleRelease
          - mobileLibre3NosiDexGoogleRelease
          - mobileLibreOldNosiDexNogoogleRelease
  push:
    branches: [ main ]
    paths:
      - 'Common/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;29.0.14206865"
          sdkmanager --install "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          VARIANT="${{ github.event.inputs.variant || 'mobileLibre3SiDexGoogleRelease' }}"
          echo "Building variant: $VARIANT"
          ./gradlew :Common:assemble${VARIANT} --no-daemon

      - name: Find APK
        id: apk
        run: |
          APK=$(find Common/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JugglucoNG-APK
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: JugglucoNG Build #${{ github.run_number }}
          files: ${{ steps.apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
