            externalNativeBuild.cmake {
                cppFlags "$CPPSTD","-DRELEASEID=1","-DDEBUG=1", "-DSCANLOG=1", "-DRELEASEDIR=1","-DNDK_DEBUG=1","-UNDEBUG"
                cFlags "-DRELEASEID=1","-DDEBUG=1", "-DSCANLOG=1", "-DRELEASEDIR=1","-DNDK_DEBUG=1","-UNDEBUG"
        }

            versionNameSuffix 'DEBUGRELEASE'
            jniDebuggable true
            debuggable true




        }
        }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "$CMAKEVERSION"
        }
    }
 compileOptions {
      coreLibraryDesugaringEnabled true

      sourceCompatibility JavaVersion.VERSION_17
      targetCompatibility JavaVersion.VERSION_17

    }


   ndkVersion "${ndkver}"

    kotlinOptions {
        jvmTarget =  JavaVersion.VERSION_17
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
            doNotStrip '**/libcalibrate.so'
            doNotStrip '**/libcalibrat2.so'
            doNotStrip '**/libinit.so'
         //  doNotStrip '**/lib??*.so'
           doNotStrip '**/lib[A-Za-mo-z]?*.so'
//           doNotStrip '**/*.so'
        }
       }
    lint {
        abortOnError false
    }
    dependenciesInfo {
        includeInApk true
        includeInBundle true
    }
    compileSdk 36
    buildToolsVersion '36.0.0'
    buildFeatures {
        aidl true
    }
       sourceSets {
       mobileLibre3SiDexGoogle {
            java.srcDirs = ['src/mobileSi/java', 'src/mobileSiGoogle/java']
            jniLibs.srcDirs = [ 'src/mobileSi/jniLibs']
            manifest { srcFile 'src/mobileSi/AndroidManifest.xml' }
            res.srcDirs= ['src/mobileSi/res']
            }
       mobileLibre3SiDexNogoogle {
            java.srcDirs = ['src/mobileSi/java', 'src/mobileSiNogoogle/java']
            jniLibs.srcDirs = [ 'src/mobileSi/jniLibs']
            manifest { srcFile 'src/mobileSi/AndroidManifest.xml' }
            res.srcDirs= ['src/mobileSi/res', 'src/mobileSiNogoogle/res']
            }
           mobileLibreOldNosiNodexNogoogle {
               java.srcDirs = ['src/mobileNosi/java']
               res.srcDirs= ['src/mobileNosi/res']
           }

           wearLibre3SiDexNogoogle{
               java.srcDirs = ['src/wearSi/java']
               jniLibs.srcDirs = [ 'src/wearSi/jniLibs']
           }
           wearLibre3SiDexGoogle{
               java.srcDirs = ['src/wearSi/java']
               jniLibs.srcDirs = [ 'src/wearSi/jniLibs']
           }



         }
   androidComponents {
        // Callback before variants are built.
        beforeVariants(selector().all(), { variant ->
            if( variant.name.contains("LibreOldNosiNodexGoogle")|| !(variant.name.contains("Libre3SiDex")||variant.name.contains("LibreOldNosiNodex"))|| (variant.name.contains("small")&&!variant.name.contains("LibreOldNosiNodexNogoogle")) ||
(variant.name.contains("wear")&&variant.name.contains("LibreOldNosiNodex"))

            ) {
                variant.enabled = false
            }
        })
    }
}

allprojects {
    tasks.withType(JavaCompile).tap {
        configureEach {
            options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
        }
    }
}

